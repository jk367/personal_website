{{ define "main" }}
<article class="single-photo">
  <h1>{{ .Title }}</h1>
  <div class="back-navigation">
    <a href="/photos/" class="back-button">← Back to Photos</a>
  </div>

  {{ if .Params.cloudflare_id }}
    <img src="https://imagedelivery.net/AdXrFVpOozxXjKClzp0UEQ/{{ .Params.cloudflare_id }}/full"
         alt="{{ .Params.alt | default .Title }}"
         fetchpriority="high"
         loading="eager">
  {{ end }}
    {{ with .Date }}
    <time>{{ .Format "January 2, 2006" }}</time>
    {{ end }}
</article>

<style>
  .single-photo img {
    width: 100%;
    max-width: 800px;
    height: auto;
    display: block;
    margin: 0;
  }
  .photo-content {
    margin-top: .25rem;
  }
</style>
{{ end }}
