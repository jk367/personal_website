<div class="posters-grid">
{{ range sort .Site.Data.posters "date" "desc" }}
    <div class="poster-item">
        <div class="poster-container">
            <img src="https://imagedelivery.net/AdXrFVpOozxXjKClzp0UEQ/{{ .cloudflare_id }}/full"
                 alt="{{ .alt }}"
                 loading="lazy"
                 width="300"
                 height="400">
        </div>
    </div>
{{ end }}
</div>


<style>
.posters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    margin: 2rem 0;
}

.poster-item {
    text-align: center;
}

.poster-container {
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
}

.poster-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@media (max-width: 768px) {
    .posters-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
    }
}
</style>
